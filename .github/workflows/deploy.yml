name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
            node-version: 22
        env:
          CALIBRE_URL: ${{ secrets.CALIBRE_URL }}
          CALIBRE_SHELF_URL: ${{ secrets.CALIBRE_SHELF_URL }}
          CALIBRE_USERNAME: ${{ secrets.CALIBRE_USERNAME }}
          CALIBRE_PASSWORD: ${{ secrets.CALIBRE_PASSWORD }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
